<header class="cu-shop-head">
  <div>
    <div class="mlabel">// catalogue · ss26</div>
    <h1>All sneakers <span class="count">· {{ total }} styles</span></h1>
  </div>
  <div class="sort">
    <span>sort by</span> <b>newest</b>
  </div>
</header>

<div class="cu-shop-bar">
  <div class="lbl">filter</div>
  <label class="cu-search-input">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/></svg>
    <input type="text" placeholder="Search products…" [ngModel]="searchTerm" (ngModelChange)="onSearchChange($event)">
  </label>
  <span class="chip on">all <b>· {{ total }}</b></span>
  <span class="chip">lifestyle</span>
  <span class="chip">running</span>
  <span class="chip">basketball</span>
  <span class="chip">skate</span>
</div>

<app-product-list
  [products]="products"
  (productAdded)="addProductToCart($event)">
</app-product-list>

<div *ngIf="hasMore" style="text-align:center;padding:32px">
  <button class="chip" type="button" (click)="loadMore()" [disabled]="loading">
    {{ loading ? 'Loading…' : 'Load more' }}
  </button>
</div>
