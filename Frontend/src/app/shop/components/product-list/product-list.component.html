<div class="cu-shop-grid">
  <app-product
    *ngFor="let product of products"
    [product]="product"
    (productAdded)="addProductToCart($event)">
  </app-product>
</div>

<div *ngIf="!products?.length"
     style="padding:64px 32px;text-align:center;font-family:'Geist Mono',monospace;font-size:12px;color:#6a6d72;letter-spacing:.06em;text-transform:uppercase">
  No products match.
</div>
