<div class="add-product-page container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0"># {{title}}</h2>
  </div>
  <hr>

  <form [formGroup]="form" *ngIf="form"  (ngSubmit)="onSubmit()">
    <div class="row g-3 mb-3">
      <div class="col-md-4">
        <mat-form-field appearance="outline" class="w-100 compact-input">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name">
          <mat-error *ngFor="let error of getFormErrors('name')">{{ error }}</mat-error>
        </mat-form-field>
      </div>

      <div class="col-md-4">
        <mat-form-field appearance="outline" class="w-100 compact-input">
          <mat-label>Price</mat-label>
          <input matInput type="number" placeholder="$" formControlName="price">
          <mat-error *ngFor="let error of getFormErrors('price')">{{ error }}</mat-error>
        </mat-form-field>
      </div>

      <div class="col-md-4 d-flex align-items-center">
        <div class="file-dropzone text-center p-2 border rounded flex-grow-1 d-flex flex-column align-items-center justify-content-center"
             (click)="fileUpload.click()">
          <img class="w-25" *ngIf="this.id" src="{{fileName}}" alt="photo"/>
          <input type="file" hidden (change)="onFileSelected($event)" #fileUpload>
          <mat-icon color="primary" class="mb-1">cloud_upload</mat-icon>
          <span class="small">{{ fileName || 'Click to upload file' }}</span>
          <mat-error *ngFor="let error of getFormErrors('image')">{{ error }}</mat-error>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-3">
      <div class="col-12">
        <mat-form-field appearance="outline" class="w-100 compact-input">
          <mat-label>Categories</mat-label>
          <mat-select formControlName="categories" multiple>
            <mat-option *ngFor="let category of categoriesList" [value]="category.id">{{ category.name }}</mat-option>
          </mat-select>
          <mat-error *ngFor="let error of getFormErrors('categories')">{{ error }}</mat-error>
        </mat-form-field>
      </div>
    </div>

    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <label class="form-label fw-bold">Sizes</label>
        <div class="d-flex flex-wrap gap-2">
          <mat-checkbox *ngFor="let size of sizesList"
                        [checked]="isSizeSelected(size.id)"
                        (change)="toggleSize(size.id, $event.checked)">
            {{ size.size }}
          </mat-checkbox>
        </div>
      </div>

      <div class="col-md-6">
        <label class="form-label fw-bold">Colors</label>
        <div class="d-flex flex-wrap gap-2">
          <mat-checkbox *ngFor="let color of colorsList"
                        [checked]="isColorSelected(color.id)"
                        (change)="toggleColor(color.id, $event.checked)">
            {{ color.name }}
          </mat-checkbox>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-3" *ngIf="selectedSizeIds.length && selectedColorIds.length">
      <div class="col-12">
        <label class="form-label fw-bold">Stock per variant</label>
        <div class="table-responsive">
          <table class="table table-bordered table-sm align-middle">
            <thead>
            <tr>
              <th>Size \ Color</th>
              <th *ngFor="let colorId of selectedColorIds">
                {{ colorLabel(colorId) }}
              </th>
            </tr>
            </thead>
            <tbody>
            <tr *ngFor="let sizeId of selectedSizeIds">
              <th>{{ sizeLabel(sizeId) }}</th>
              <td *ngFor="let colorId of selectedColorIds">
                <input type="number" min="0"
                       class="form-control form-control-sm"
                       [value]="getStock(sizeId, colorId)"
                       (input)="onStockChange(sizeId, colorId, $any($event.target).value)">
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-3">
      <div class="col-12">
        <mat-form-field appearance="outline" class="w-100 compact-input">
          <mat-label>Description</mat-label>
          <textarea matInput rows="3" formControlName="description"></textarea>
          <mat-error *ngFor="let error of getFormErrors('description')">{{ error }}</mat-error>
        </mat-form-field>
      </div>
    </div>

    <div class="d-flex justify-content-center">
      <button mat-raised-button class="btn-custom background-primary" type="submit">Submit</button>
    </div>

  </form>
</div>
