<div class="tm-body">
  <div class="tm-pgh">
    <div>
      <h1>Products</h1>
      <div class="meta">
        <span class="live"><span class="pulse"></span>{{ tableInfo.total || 0 }} products</span>
        <span>·</span>
      </div>
    </div>
    <a class="tm-btn pri" [routerLink]="['/admin-panel/products/add']">
      <span>+ New product</span>
      <span class="kbd">N</span>
    </a>
  </div>

  <div class="tm-bar">
    <label class="tm-bar-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/></svg>
      <input
        type="text"
        placeholder="Search by ID or name…"
        [(ngModel)]="search"
        (keyup)="applySearch(search)"
      >
    </label>
    <span class="chip on">All</span>
    <span class="chip">Lifestyle</span>
    <span class="chip">Running</span>
    <span class="chip">Basketball</span>
    <span class="chip">Skate</span>
    <span class="sep"></span>
    <span class="chip">status: <b>live</b></span>
    <span class="chip">stock: <b>any</b></span>
    <div class="right">
      <button class="tm-btn" type="button" (click)="clearFilters()" *ngIf="search">
        <mat-icon style="font-size:14px;width:14px;height:14px;line-height:14px">filter_alt_off</mat-icon>
        Clear
      </button>
    </div>
  </div>

  <app-products-table
    [filters]="filters"
    (filterChange)="onTableFilterChange($event)">
  </app-products-table>
</div>
