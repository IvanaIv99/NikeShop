<section class="tm-panel">
  <header class="tm-panel-head">
    <h3>Top sellers</h3>
    <span class="sub">by units sold</span>
    <div class="right">
      <span class="tab on">Units</span>
    </div>
  </header>
  <div class="tm-topprods">
    <div class="tm-prowrap tm-prowrap-tight" *ngFor="let product of topSellingProducts; let i = index">
      <span class="rk">{{ '0' + (i + 1) | slice:-2 }}</span>
      <div class="ph">
        <img *ngIf="product.image" [src]="product.image" [alt]="product.name">
      </div>
      <div class="nm">
        {{ product.name }}
        <small>#{{ product.id }}</small>
      </div>
      <span class="pr">{{ product.orders_count }} sales</span>
    </div>

    <div class="tm-prowrap tm-prowrap-tight" *ngIf="!topSellingProducts?.length">
      <span class="rk">—</span>
      <div class="ph"></div>
      <div class="nm">No data yet<small>top sellers will appear here</small></div>
      <span class="pr">—</span>
    </div>
  </div>
</section>
