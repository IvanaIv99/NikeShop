<div class="tm-stats">
  <div class="tm-stat" *ngFor="let card of stats">
    <div class="k">
      <span>{{ card.label }}</span>
      <span class="pill" style="background:transparent;border-color:transparent;color:#6a6d72;font-family:'Geist Mono',monospace">today</span>
    </div>
    <div class="v">
      <mat-icon>{{ card.icon }}</mat-icon>{{ card.value }}
    </div>
    <div class="sub">
      <span>from today's orders</span>
    </div>
  </div>
</div>
