<a *ngIf="item.url && !item.external"
   class="tm-nav-item"
   [routerLink]="[item.url]"
   [routerLinkActive]="'active'"
   [target]="item.target ? '_blank' : '_self'">
  <i *ngIf="item.icon" [ngClass]="item.icon"></i>
  <span>{{ item.title }}</span>
</a>

<a *ngIf="item.url && item.external"
   class="tm-nav-item"
   [href]="item.url"
   [target]="item.target ? '_blank' : '_self'">
  <i *ngIf="item.icon" [ngClass]="item.icon"></i>
  <span>{{ item.title }}</span>
</a>
