<div class="tm-body">
  <div class="tm-pgh">
    <div>
      <h1>Orders</h1>
      <div class="meta">
        <span class="live"><span class="pulse"></span>{{ tableInfo.total || 0 }} in view</span>
        <span>·</span>
      </div>
    </div>
  </div>

  <div class="tm-bar">
    <label class="tm-bar-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/></svg>
      <input
        type="text"
        placeholder="Order ID, customer, or email…"
        [(ngModel)]="search"
        (keyup)="applySearch(search)">
    </label>

    <!-- Status — chip-button opens a menu -->
    <button class="chip tm-chip-trigger" type="button" [matMenuTriggerFor]="statusMenu" [class.on]="!!filters.status">
      <span class="lbl">status:</span>
      <b>{{ filters.status || 'all' }}</b>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <mat-menu #statusMenu="matMenu" class="tm-menu" xPosition="after">
      <button mat-menu-item type="button" (click)="applyStatus(null)" [class.on]="!filters.status">
        <span class="dot any"></span>All
      </button>
      <button mat-menu-item type="button" *ngFor="let s of statusOptions" (click)="applyStatus(s.value)" [class.on]="filters.status === s.value">
        <span class="dot" [attr.data-status]="s.value"></span>{{ s.label }}
      </button>
    </mat-menu>

    <!-- Date range — chip-shaped wrapper around the picker -->
    <div class="chip tm-chip-daterange" [class.on]="filters.dateFrom || filters.dateTo">
      <span class="lbl">dates:</span>
      <mat-date-range-input [rangePicker]="picker" class="tm-range-input">
        <input matStartDate placeholder="from" [(ngModel)]="filters.dateFrom" (dateChange)="applyDateFrom($event.value)">
        <span class="dash">→</span>
        <input matEndDate placeholder="to" [(ngModel)]="filters.dateTo" (dateChange)="applyDateTo($event.value)">
      </mat-date-range-input>
      <button type="button" class="trig" (click)="picker.open()" aria-label="Open date picker">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="16" rx="1"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
      </button>
      <mat-date-range-picker #picker></mat-date-range-picker>
    </div>

    <div class="right">
      <button class="tm-btn" type="button" (click)="clearFilters()" *ngIf="search || filters.status || filters.dateFrom || filters.dateTo">
        <mat-icon style="font-size:14px;width:14px;height:14px;line-height:14px">filter_alt_off</mat-icon>
        Clear
      </button>
    </div>
  </div>

  <app-orders-table
    [filters]="filters"
    (filterChange)="onTableFilterChange($event)">
  </app-orders-table>
</div>
